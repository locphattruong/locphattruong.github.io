<section class="academic-section">
  <div class="container">
    {{ if .Get "title" }}
    <h2 class="section-title">{{ .Get "title" }}</h2>
    {{ end }}
    <div class="carousel-track">
      <div class="carousel-item">
        <img src="{{ .Get "src" }}" alt="{{ .Get "alt" | default "Carousel image" }}" loading="lazy"/>
        {{ if .Get "caption" }}
        <h3 class="carousel-caption">{{ .Get "caption" }}</h3>
        {{ end }}
      </div>
    </div>
  </div>
</section>
